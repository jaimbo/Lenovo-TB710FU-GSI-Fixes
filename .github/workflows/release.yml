name: Build and Release Magisk Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and Sign Overlay APK
        run: |
          # Use the latest stable build tools to avoid XML version warnings
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          PLATFORM=$ANDROID_HOME/platforms/android-34
          
          # Install necessary components quietly
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null

          # Create a temporary directory for compiled resources
          mkdir -p compiled
          
          # 1. Compile XML resources (using aapt2 compile)
          # We use --dir to catch all files in res/values/
          $BUILD_TOOLS/aapt2 compile --dir overlay/res -o compiled/

          # 2. Link APK
          # This links the compiled flat files into the final APK
          $BUILD_TOOLS/aapt2 link -I $PLATFORM/android.jar \
            --manifest overlay/AndroidManifest.xml \
            -o unsigned.apk \
            $(find compiled -name "*.flat")

          # 3. Zipalign (ensure 4-byte alignment for RROs)
          $BUILD_TOOLS/zipalign -p -f 4 unsigned.apk aligned.apk

          # 4. Generate a temporary Keystore for signing
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass magisk123 -keypass magisk123 -dname "CN=GSI, OU=GSI, O=GSI, L=GSI, S=GSI, C=US"

          # 5. Sign and place in the Magisk module structure
          mkdir -p module/system/product/overlay/
          $BUILD_TOOLS/apksigner sign --ks release.keystore --ks-pass pass:magisk123 \
            --out module/system/product/overlay/treble-overlay-lenovo-tb710fu.apk aligned.apk

      - name: Package Magisk Module
        run: |
          cd module
          zip -r9 ../Lenovo_TB710FU_GSI_Fixes_${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Lenovo_TB710FU_GSI_Fixes_${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}